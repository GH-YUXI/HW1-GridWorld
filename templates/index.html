<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Map Policy Evaluation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page">
        <header>
            <h1>n x n 網格地圖與策略評估</h1>
            <p>先設定起點、終點與障礙物，再產生隨機策略箭頭與狀態價值 V(s)。</p>
        </header>

        <section class="control-panel">
            <div class="control-row">
                <label for="gridSize">選擇網格尺寸 n：</label>
                <select id="gridSize">
                    <option value="5">5 x 5</option>
                    <option value="6">6 x 6</option>
                    <option value="7">7 x 7</option>
                    <option value="8">8 x 8</option>
                    <option value="9">9 x 9</option>
                </select>
                <button id="createGridBtn">建立網格</button>
                <button id="clearBtn" class="secondary">清空設定</button>
            </div>

            <div class="parameter-row">
                <label for="stepReward">步驟獎勵 Reward：</label>
                <input id="stepReward" type="number" step="0.1" value="-1">

                <label for="gamma">折扣因子 γ：</label>
                <input id="gamma" type="number" step="0.01" min="0" max="1" value="0.9">
            </div>

            <div class="mode-row">
                <span>編輯模式：</span>
                <button class="mode-btn active" data-mode="start">起點</button>
                <button class="mode-btn" data-mode="end">終點</button>
                <button class="mode-btn" data-mode="obstacle">障礙物</button>
                <button class="mode-btn" data-mode="erase">清除格子</button>
            </div>

            <div class="status-board">
                <div>目前 n：<strong id="currentN">5</strong></div>
                <div>起點數：<strong id="startCount">0</strong>/1</div>
                <div>終點數：<strong id="endCount">0</strong>/1</div>
                <div>障礙物：<strong id="obstacleCount">0</strong>/<span id="obstacleTarget">3</span></div>
                <div>Reward：<strong id="currentReward">-1</strong></div>
                <div>γ：<strong id="currentGamma">0.9</strong></div>
                <div>目前模式：<strong id="currentModeLabel">起點</strong></div>
            </div>

            <div class="tips">
                <span class="legend start"></span> 起點
                <span class="legend end"></span> 終點
                <span class="legend obstacle"></span> 障礙物
                <span class="legend empty"></span> 一般格子
            </div>

            <div class="action-row">
                <button id="evaluateBtn" class="primary">產生隨機策略並評估 V(s)</button>
            </div>
        </section>

        <section class="workspace">
            <div id="grid" class="grid"></div>
            <aside class="info-panel">
                <h2>操作說明</h2>
                <ol>
                    <li>選擇 n（5 到 9）並建立網格。</li>
                    <li>可自行設定步驟獎勵 Reward 與折扣因子 γ。</li>
                    <li>切換模式後，用滑鼠點擊格子設定起點、終點、障礙物。</li>
                    <li>障礙物數量最多為 n-2，可少於 n-2。</li>
                    <li>按下評估按鈕後，格子會顯示策略箭頭與 V(s)。</li>
                </ol>
                <div id="message" class="message">請先建立網格並完成設定。</div>
            </aside>
        </section>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
